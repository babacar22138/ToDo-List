<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do list</title>
    <link rel="stylesheet" href="asserts/js/css/loader.css">
    <link rel="stylesheet" href="asserts/js/css/reset.css">
    <link rel="stylesheet" href="asserts/js/css/style.css">*
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <main>
        <section class="partie-ahut">
            <h1>To do list</h1>
            <p>Organize your work day better !</p>
            <time datetime=""></time>
            <p>Before the end of the day 
                <i class="fa-solid fa-hourglass"></i>
            </p>
        </section>

        <section class="partie-bas">
            <div class="task">
                <div class="priority-btn-add">
                    <select name="priority" id="priority_select">
                        <option value="not-urgent">not-urgent</option>
                        <option value="semi-urgent">semi-urgent</option>
                        <option value="urgent">urgent</option>
                    </select>

                    <button>+</button>
                </div>
            </div>

            <h2>To do 
                <i class="fa-solid fa-square-check"></i>
            </h2>

            <ul>
                <li></li>
            </ul>
        </section>
    </main>

    <script src="asserts/js/main.js"></script>
</body>
</html>
