<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo list</title>
    <link rel="stylesheet" href="asserts/js/css/loader.css">
    <link rel="stylesheet" href="asserts/js/css/reset.css">
    <link rel="stylesheet" href="asserts/js/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <main>
        <section class="partie-haut">
            <h1>ToDo List</h1>
            <p id="sous-titre">Organize your work day better !</p>
            <time id="timer" datetime=""></time>
            <p id="before">Before the end of the day 
                <i class="fa-solid fa-hourglass bin"></i>
            </p>
        </section>

        <section class="partie-bas">
            <div class="task">
                <input type="text" name="add-task" id="add-task" placeholder="add a task" required>

                    <select name="priority" id="priority-select" required>
                        <option value="not-urgent">not-urgent</option>
                        <option value="semi-urgent">semi-urgent</option>
                        <option value="urgent">urgent</option>
                    </select>
                        
                    <button id="btn-add">+</button>
            </div>

            <h2 id="title-to-do">ToDo 
                <i class="fa-solid fa-square-check"></i>
            </h2>

            <ul class="list-tasks">
            </ul>
        </section>
    </main>
    <script src="asserts/js/main.js"></script>
</body>
</html>
